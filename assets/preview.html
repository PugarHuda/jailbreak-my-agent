<!doctype html>
<meta charset="utf-8">
<title>Jailbreak-My-Agent — logo preview</title>
<style>
  body { margin:0; }
  .row { display:flex; flex-wrap:wrap; gap:32px; align-items:center; padding:40px; }
  .light { background:#F4F4F4; }
  .dark  { background:#1b1b1b; }
  h2 { font:700 13px/1 Arial,sans-serif; letter-spacing:3px; color:#888; margin:24px 40px 0; text-transform:uppercase; }
  img.logo { width:420px; max-width:90vw; }
  .chip { display:flex; flex-direction:column; align-items:center; gap:8px; font:700 12px Arial,sans-serif; color:#999; }
</style>
<h2>Logo lockup</h2>
<div class="row light"><img class="logo" src="logo.svg" alt="logo"></div>
<div class="row dark"><img class="logo" src="logo.svg" alt="logo"></div>
<h2>Store avatar (icon.svg)</h2>
<div class="row light">
  <div class="chip"><img src="icon.svg" width="240" height="240"><span>240px</span></div>
  <div class="chip"><img src="icon.svg" width="96" height="96"><span>96px</span></div>
  <div class="chip"><img src="icon.svg" width="48" height="48"><span>48px</span></div>
</div>
